plugins {
    id 'fabric-loom' version '1.9.2' // Самая свежая стабильная версия
}

version = '1.0.0'
group = 'net.midpoint'

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    loader "net.fabricmc:fabric-loader:0.16.10"
    
    // Подключаем Fabric API для работы HUD индикатора
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.11"
}

sourceSets {
    main {
        java {
            srcDirs = ['.'] // Ищем Java файлы прямо в корне репозитория
        }
        resources {
            srcDirs = ['.'] // Ищем JSON файлы прямо в корне репозитория
        }
    }
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
